name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        working-directory: cli
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${TAG_NAME}" -o ../bingo-linux-amd64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bingo-linux-amd64
